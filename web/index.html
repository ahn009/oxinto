<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Product Advisor</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="shortcut icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:       #0a0b0f;
      --bg-surface:    #111318;
      --bg-elevated:   #181b23;
      --bg-card:       #1e2130;
      --bg-input:      #13151d;
      --border:        rgba(255,255,255,0.07);
      --border-focus:  rgba(99,102,241,0.6);

      --primary:       #6366f1;
      --primary-light: #818cf8;
      --primary-glow:  rgba(99,102,241,0.25);
      --accent:        #06d6a0;
      --accent-glow:   rgba(6,214,160,0.2);
      --gold:          #f59e0b;
      --gold-glow:     rgba(245,158,11,0.2);
      --blue:          #3b82f6;
      --blue-glow:     rgba(59,130,246,0.2);
      --rose:          #f43f5e;

      --text-primary:  #f0f2ff;
      --text-secondary:#9ca3af;
      --text-muted:    #4b5563;

      --radius-sm:  8px;
      --radius-md:  14px;
      --radius-lg:  20px;
      --radius-xl:  28px;

      --shadow-sm:  0 2px 8px rgba(0,0,0,0.4);
      --shadow-md:  0 4px 20px rgba(0,0,0,0.5);
      --shadow-lg:  0 8px 40px rgba(0,0,0,0.6);
      --shadow-glow: 0 0 30px var(--primary-glow);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Animated grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient blobs */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99,102,241,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .blob-bottom {
      position: fixed;
      bottom: -150px;
      left: -150px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(6,214,160,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10,11,15,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 16px var(--primary-glow);
      flex-shrink: 0;
    }

    .header-title {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--text-primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 0.7rem;
      color: var(--text-secondary);
      margin-top: 1px;
      font-weight: 400;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--accent);
      font-weight: 600;
      background: rgba(6,214,160,0.1);
      border: 1px solid rgba(6,214,160,0.2);
      border-radius: 20px;
      padding: 0.25rem 0.65rem;
    }

    .status-dot::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .lang-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 3px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      letter-spacing: 0.05em;
    }

    .lang-btn.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 10px var(--primary-glow);
    }

    /* ── Layout ── */
    .container {
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1rem;
      gap: 1rem;
      position: relative;
      z-index: 1;
      overflow: hidden;
    }

    /* ── Progress ── */
    .progress-wrap {
      display: none;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
      align-items: center;
      gap: 1rem;
    }

    .progress-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .progress-label {
      font-size: 0.72rem;
      color: var(--text-secondary);
      font-weight: 500;
      white-space: nowrap;
    }

    .progress-step {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--primary-light);
    }

    .progress-bar-track {
      flex: 1;
      height: 5px;
      background: var(--bg-card);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 3px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1);
      position: relative;
    }

    .progress-bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .progress-pct {
      font-size: 0.72rem;
      color: var(--primary-light);
      font-weight: 700;
      min-width: 30px;
      text-align: right;
    }

    /* ── Chat Window ── */
    #chat-window {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
      position: relative;
    }

    /* Custom scrollbar */
    #chat-window::-webkit-scrollbar { width: 5px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb {
      background: rgba(99,102,241,0.3);
      border-radius: 3px;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      gap: 0.75rem;
      max-width: 88%;
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.bot  { align-self: flex-start; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
    }

    .message.bot .avatar {
      background: linear-gradient(135deg, #1e2130, #13151d);
      border: 1.5px solid rgba(99,102,241,0.4);
      box-shadow: 0 0 14px var(--primary-glow);
    }

    .message.user .avatar {
      background: linear-gradient(135deg, #0d2e26, #0a1f1a);
      border: 1.5px solid rgba(6,214,160,0.4);
      box-shadow: 0 0 14px var(--accent-glow);
    }

    .avatar svg { display: block; }

    .bubble {
      padding: 0.7rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      max-width: 100%;
    }

    .message.bot .bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .message.user .bubble {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      border-bottom-right-radius: 4px;
      color: white;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    /* ── Quick Replies ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 0 0.25rem;
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
    }

    .qr-btn {
      background: var(--bg-elevated);
      border: 1px solid rgba(99,102,241,0.35);
      color: var(--primary-light);
      border-radius: 20px;
      padding: 0.45rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .qr-btn:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 14px var(--primary-glow);
      transform: translateY(-1px);
    }

    .qr-btn:active { transform: scale(0.97) translateY(0); }

    /* ── Offers Container ── */
    .offers-wrapper {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .offers-header {
      background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(139,92,246,0.08));
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: var(--radius-md);
      padding: 0.85rem 1.1rem;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--primary-light);
      letter-spacing: 0.01em;
    }

    /* Tier cards */
    .tier-card {
      border-radius: var(--radius-md);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--bg-card);
    }

    .tier-header {
      padding: 0.65rem 1rem;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tier-basic   .tier-header { background: rgba(6,214,160,0.1);  border-bottom: 1px solid rgba(6,214,160,0.15);  color: var(--accent); }
    .tier-mid     .tier-header { background: rgba(59,130,246,0.1); border-bottom: 1px solid rgba(59,130,246,0.15); color: #60a5fa; }
    .tier-premium .tier-header { background: rgba(245,158,11,0.1); border-bottom: 1px solid rgba(245,158,11,0.15); color: var(--gold); }

    .tier-body {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .product-card {
      display: flex;
      gap: 0.85rem;
      padding: 0.85rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      transition: border-color 0.2s, transform 0.2s;
      align-items: flex-start;
    }

    .product-card:hover {
      border-color: rgba(99,102,241,0.3);
      transform: translateY(-1px);
    }

    .product-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--bg-card), var(--bg-base));
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .product-info { flex: 1; min-width: 0; }

    .product-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .product-name {
      font-weight: 700;
      font-size: 0.88rem;
      color: var(--text-primary);
      line-height: 1.3;
    }

    .product-price {
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--primary-light);
      white-space: nowrap;
    }

    .product-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 3px;
      line-height: 1.4;
    }

    .product-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .score-pill {
      font-size: 0.68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(99,102,241,0.15);
      color: var(--primary-light);
      border: 1px solid rgba(99,102,241,0.25);
    }

    .reason-text {
      font-size: 0.72rem;
      color: var(--accent);
      font-style: italic;
    }

    /* Bundle */
    .bundle-card {
      background: linear-gradient(135deg, rgba(245,158,11,0.07), rgba(245,158,11,0.03));
      border: 1px dashed rgba(245,158,11,0.3);
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.9rem;
      margin-top: 0.25rem;
    }

    .bundle-title {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }

    .bundle-items {
      font-size: 0.72rem;
      color: var(--text-secondary);
    }

    .bundle-savings {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 6px;
    }

    /* ── Typing Indicator ── */
    .typing-wrap { display: flex; gap: 0.75rem; align-self: flex-start; animation: slideIn 0.25s ease; }

    .typing-bubble {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      border-bottom-left-radius: 4px;
      padding: 0.7rem 1rem;
      display: flex;
      align-items: center;
      gap: 5px;
      height: 38px;
    }

    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--primary-light);
      animation: bounce 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.18s; }
    .typing-dot:nth-child(3) { animation-delay: 0.36s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input Area ── */
    .input-area {
      background: var(--bg-surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 0.85rem;
      display: flex;
      gap: 0.6rem;
      align-items: flex-end;
      transition: border-color 0.2s;
    }

    .input-area:focus-within {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    #user-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.9rem;
      font-size: 0.88rem;
      color: var(--text-primary);
      resize: none;
      max-height: 100px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
      line-height: 1.5;
    }

    #user-input::placeholder { color: var(--text-muted); }
    #user-input:focus { border-color: rgba(99,102,241,0.5); }

    .input-actions {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      align-items: center;
    }

    #send-btn {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.65rem 1.2rem;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
      box-shadow: 0 4px 12px var(--primary-glow);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    #send-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px var(--primary-glow);
    }

    #send-btn:active { transform: scale(0.97); }

    #send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    #reset-btn {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.35rem 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }

    #reset-btn:hover {
      color: var(--rose);
      border-color: rgba(244,63,94,0.4);
      background: rgba(244,63,94,0.07);
    }

    /* ── Empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      padding: 2rem;
      opacity: 0.5;
      text-align: center;
    }

    .empty-icon { font-size: 2.5rem; }

    .empty-text {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 1.2rem;
      font-size: 0.82rem;
      color: var(--text-secondary);
      z-index: 999;
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
      box-shadow: var(--shadow-md);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .container { padding: 0.75rem 0.5rem; }
      header { padding: 0 1rem; }
      header h1 { font-size: 0.9rem; }
      #chat-window { padding: 1rem; }
      .message { max-width: 96%; }
      .header-subtitle { display: none; }
      .status-dot span { display: none; }
    }

    /* Scrollbar for Firefox */
    #chat-window { scrollbar-width: thin; scrollbar-color: rgba(99,102,241,0.3) transparent; }

    /* ── Auth Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-box {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-lg), 0 0 60px var(--primary-glow);
      animation: slideIn 0.3s cubic-bezier(.4,0,.2,1);
    }

    .modal-logo {
      width: 52px; height: 52px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      box-shadow: 0 0 24px var(--primary-glow);
    }

    .modal-title {
      text-align: center;
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
      background: linear-gradient(90deg, var(--text-primary), var(--primary-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .auth-tabs {
      display: flex;
      gap: 2px;
      background: var(--bg-card);
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 1.25rem;
    }

    .auth-tab {
      flex: 1;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 0 12px var(--primary-glow);
    }

    .auth-form { display: flex; flex-direction: column; gap: 0.75rem; }

    .form-field { display: flex; flex-direction: column; gap: 0.35rem; }

    .form-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 0.05em;
    }

    .form-input {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 0.9rem;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .form-input::placeholder { color: var(--text-muted); }

    .auth-btn {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 0.75rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 14px var(--primary-glow);
      margin-top: 0.25rem;
    }

    .auth-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px var(--primary-glow); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .auth-error {
      background: rgba(244,63,94,0.1);
      border: 1px solid rgba(244,63,94,0.3);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.85rem;
      font-size: 0.8rem;
      color: var(--rose);
      display: none;
    }

    .auth-skip {
      text-align: center;
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .auth-skip button {
      background: none;
      border: none;
      color: var(--primary-light);
      cursor: pointer;
      font-size: 0.75rem;
      font-family: inherit;
      text-decoration: underline;
    }

    /* ── User badge in header ── */
    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.65rem 0.25rem 0.35rem;
      font-size: 0.72rem;
    }

    .user-avatar-sm {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .user-name-sm { color: var(--text-primary); font-weight: 600; max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .logout-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.65rem;
      padding: 0;
      font-family: inherit;
      transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--rose); }
  </style>
</head>
<body>

<div class="blob-bottom"></div>

<!-- ── Auth Modal ── -->
<div class="modal-overlay" id="auth-modal">
  <div class="modal-box">
    <div class="modal-logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L13.8 8.2L20 10L13.8 11.8L12 18L10.2 11.8L4 10L10.2 8.2L12 2Z" fill="white" opacity="0.95"/>
        <path d="M19 16L19.9 18.1L22 19L19.9 19.9L19 22L18.1 19.9L16 19L18.1 18.1L19 16Z" fill="white" opacity="0.7"/>
        <path d="M5 3L5.7 5.3L8 6L5.7 6.7L5 9L4.3 6.7L2 6L4.3 5.3L5 3Z" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div class="modal-title">Smart Product Advisor</div>
    <div class="modal-subtitle">Sign in to get personalized recommendations</div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab"        onclick="switchTab('signup')">Create Account</button>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!-- Login form -->
    <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
      <div class="form-field">
        <label class="form-label">EMAIL</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-field">
        <label class="form-label">PASSWORD</label>
        <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password"/>
      </div>
      <button class="auth-btn" type="submit" id="login-btn">Sign In</button>
    </form>

    <!-- Signup form (hidden initially) -->
    <form class="auth-form" id="signup-form" onsubmit="handleSignup(event)" style="display:none;">
      <div class="form-field">
        <label class="form-label">YOUR NAME</label>
        <input class="form-input" type="text" id="signup-name" placeholder="John Smith" required autocomplete="name" minlength="2"/>
      </div>
      <div class="form-field">
        <label class="form-label">EMAIL</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="form-field">
        <label class="form-label">PASSWORD</label>
        <input class="form-input" type="password" id="signup-password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8"/>
      </div>
      <button class="auth-btn" type="submit" id="signup-btn">Create Account</button>
    </form>

    <div class="auth-skip">
      <button onclick="skipAuth()">Continue without account</button>
    </div>
  </div>
</div>

<!-- ── Header ── -->
<header>
  <div class="header-left">
    <div class="header-logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L13.8 8.2L20 10L13.8 11.8L12 18L10.2 11.8L4 10L10.2 8.2L12 2Z" fill="white" opacity="0.95"/>
        <path d="M19 16L19.9 18.1L22 19L19.9 19.9L19 22L18.1 19.9L16 19L18.1 18.1L19 16Z" fill="white" opacity="0.7"/>
        <path d="M5 3L5.7 5.3L8 6L5.7 6.7L5 9L4.3 6.7L2 6L4.3 5.3L5 3Z" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Smart Product Advisor</div>
      <div class="header-subtitle">AI-powered recommendations</div>
    </div>
  </div>
  <div class="header-right">
    <!-- Shown when logged out -->
    <div class="status-dot" id="status-live"><span>Live</span></div>
    <!-- Shown when logged in -->
    <div class="user-badge" id="user-badge" style="display:none;">
      <div class="user-avatar-sm" id="user-initials">?</div>
      <span class="user-name-sm" id="user-name-display"></span>
      <button class="logout-btn" onclick="handleLogout()">Sign out</button>
    </div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('en')">EN</button>
      <button class="lang-btn"        onclick="setLang('pt')">PT</button>
    </div>
  </div>
</header>

<!-- ── Main ── -->
<div class="container">

  <!-- Progress Bar -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-info">
      <div class="progress-step" id="progress-step">Step 1</div>
      <div class="progress-label" id="progress-label">Question 1 of 6</div>
    </div>
    <div class="progress-bar-track">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-pct" id="progress-pct">0%</div>
  </div>

  <!-- Chat Window -->
  <div id="chat-window">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">✨</div>
      <div class="empty-text">Starting your personalized session…</div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Type your answer or choose an option above…"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <div class="input-actions">
      <button id="send-btn" onclick="sendMessage()">
        Send ↑
      </button>
      <button id="reset-btn" onclick="resetSession()">↺ Reset</button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  Auth state
// ─────────────────────────────────────────────
const auth = {
  token: localStorage.getItem('smart_token') || null,
  user:  JSON.parse(localStorage.getItem('smart_user') || 'null'),
};

function isLoggedIn() { return !!auth.token && !!auth.user; }

function saveAuth(token, user) {
  auth.token = token;
  auth.user  = user;
  localStorage.setItem('smart_token', token);
  localStorage.setItem('smart_user', JSON.stringify(user));
}

function clearAuth() {
  auth.token = null;
  auth.user  = null;
  localStorage.removeItem('smart_token');
  localStorage.removeItem('smart_user');
  localStorage.removeItem('smart_session_id');
}

function getAuthHeaders() {
  return auth.token ? { 'Authorization': `Bearer ${auth.token}` } : {};
}

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
const state = {
  sessionId:      localStorage.getItem('smart_session_id') || null,
  userId:         isLoggedIn()
                    ? 'user_' + auth.user.id
                    : (localStorage.getItem('smart_user_id') || ('web_' + Math.random().toString(36).slice(2, 10))),
  lang:           localStorage.getItem('smart_lang') || 'en',
  isComplete:     false,
  questionNumber: 0,
  totalQuestions: 0,
  currentOptions: null,
};
if (!isLoggedIn()) localStorage.setItem('smart_user_id', state.userId);

// ─────────────────────────────────────────────
//  DOM refs
// ─────────────────────────────────────────────
const chatWindow  = document.getElementById('chat-window');
const userInput   = document.getElementById('user-input');
const sendBtn     = document.getElementById('send-btn');
const emptyState  = document.getElementById('empty-state');

// ─────────────────────────────────────────────
//  SVG Icons
// ─────────────────────────────────────────────
const SVG_AI = `<svg width="17" height="17" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path d="M12 2L13.8 8.2L20 10L13.8 11.8L12 18L10.2 11.8L4 10L10.2 8.2L12 2Z" fill="#818cf8"/>
  <path d="M19 16L19.9 18.1L22 19L19.9 19.9L19 22L18.1 19.9L16 19L18.1 18.1L19 16Z" fill="#a5b4fc" opacity="0.8"/>
  <path d="M5 3L5.7 5.3L8 6L5.7 6.7L5 9L4.3 6.7L2 6L4.3 5.3L5 3Z" fill="#c7d2fe" opacity="0.7"/>
</svg>`;

const SVG_USER = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="12" cy="8" r="4" fill="#06d6a0" opacity="0.9"/>
  <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="#06d6a0" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
</svg>`;

// ─────────────────────────────────────────────
//  Helpers: DOM
// ─────────────────────────────────────────────
function removeEmpty() {
  if (emptyState) emptyState.remove();
}

function scrollBottom() {
  chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
}

function getCategoryEmoji(tags) {
  if (!tags) return '🎧';
  const t = tags.join(' ').toLowerCase();
  if (t.includes('kid') || t.includes('child')) return '🧒';
  if (t.includes('sport')) return '🏃';
  if (t.includes('studio') || t.includes('professional')) return '🎙️';
  if (t.includes('wireless') || t.includes('bluetooth')) return '🎵';
  return '🎧';
}

function makeAvatar(role) {
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.innerHTML = role === 'bot' ? SVG_AI : SVG_USER;
  return avatar;
}

// ── Add a bot/user bubble ──
function addMessage(text, role = 'bot') {
  removeEmpty();

  const wrap   = document.createElement('div');
  wrap.className = `message ${role}`;

  const avatar = makeAvatar(role);

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatWindow.appendChild(wrap);
  scrollBottom();
}

// ── Render 3-tier offer cards ──
function addOffers(offers) {
  removeEmpty();

  const msgWrap = document.createElement('div');
  msgWrap.className = 'message bot';
  msgWrap.style.maxWidth = '100%';
  msgWrap.style.width = '100%';

  const avatar = makeAvatar('bot');

  const wrapper = document.createElement('div');
  wrapper.className = 'offers-wrapper';
  wrapper.style.flex = '1';

  // header
  const hdr = document.createElement('div');
  hdr.className = 'offers-header';
  hdr.textContent = state.lang === 'pt'
    ? '🎯 Suas Recomendações Personalizadas'
    : '🎯 Your Personalized Recommendations';
  wrapper.appendChild(hdr);

  if (offers.basic && offers.basic.length > 0) {
    wrapper.appendChild(buildTier('basic', '🟢', state.lang === 'pt' ? 'Opções Básicas' : 'Basic Options', offers.basic, null));
  }
  if (offers.intermediate && offers.intermediate.length > 0) {
    wrapper.appendChild(buildTier('mid', '🔵', state.lang === 'pt' ? 'Opções Intermediárias' : 'Intermediate Options', offers.intermediate, null));
  }
  if (offers.premium) {
    wrapper.appendChild(buildTier('premium', '⭐', state.lang === 'pt' ? 'Recomendação Premium' : 'Premium Pick', [offers.premium.product], offers.premium.bundle));
  }

  msgWrap.appendChild(avatar);
  msgWrap.appendChild(wrapper);
  chatWindow.appendChild(msgWrap);
  scrollBottom();
}

function buildTier(tierClass, icon, label, products, bundle) {
  const card = document.createElement('div');
  card.className = `tier-card tier-${tierClass}`;

  const th = document.createElement('div');
  th.className = 'tier-header';
  th.innerHTML = `<span>${icon}</span><span>${label}</span>`;
  card.appendChild(th);

  const body = document.createElement('div');
  body.className = 'tier-body';

  products.forEach(p => {
    const pc = document.createElement('div');
    pc.className = 'product-card';

    const iconDiv = document.createElement('div');
    iconDiv.className = 'product-icon';
    iconDiv.textContent = getCategoryEmoji(p.tags);

    const info = document.createElement('div');
    info.className = 'product-info';

    const top = document.createElement('div');
    top.className = 'product-top';

    const name = document.createElement('div');
    name.className = 'product-name';
    name.textContent = p.name;

    const price = document.createElement('div');
    price.className = 'product-price';
    price.textContent = `$${p.price}`;

    top.appendChild(name);
    top.appendChild(price);
    info.appendChild(top);

    if (p.description) {
      const desc = document.createElement('div');
      desc.className = 'product-desc';
      desc.textContent = p.description;
      info.appendChild(desc);
    }

    const meta = document.createElement('div');
    meta.className = 'product-meta';

    if (p.score) {
      const pill = document.createElement('span');
      pill.className = 'score-pill';
      pill.textContent = `${p.score}% match`;
      meta.appendChild(pill);
    }

    if (p.reason) {
      const reason = document.createElement('span');
      reason.className = 'reason-text';
      reason.textContent = '✓ ' + p.reason;
      meta.appendChild(reason);
    }

    if (meta.children.length > 0) info.appendChild(meta);

    pc.appendChild(iconDiv);
    pc.appendChild(info);
    body.appendChild(pc);
  });

  // Bundle
  if (bundle) {
    const b = document.createElement('div');
    b.className = 'bundle-card';

    const bt = document.createElement('div');
    bt.className = 'bundle-title';
    bt.textContent = state.lang === 'pt' ? '🎁 Pacote inclui:' : '🎁 Bundle includes:';
    b.appendChild(bt);

    const bi = document.createElement('div');
    bi.className = 'bundle-items';
    bi.textContent = bundle.items.join(' · ');
    b.appendChild(bi);

    const bs = document.createElement('div');
    bs.className = 'bundle-savings';
    bs.textContent = state.lang === 'pt'
      ? `💰 Com ${bundle.discountPercent}% off: $${bundle.totalPrice} — economize $${bundle.savings}`
      : `💰 Bundle with ${bundle.discountPercent}% off: $${bundle.totalPrice} — save $${bundle.savings}`;
    b.appendChild(bs);

    body.appendChild(b);
  }

  card.appendChild(body);
  return card;
}

// ── Quick reply buttons ──
function addQuickReplies(options) {
  state.currentOptions = options;
  const wrap = document.createElement('div');
  wrap.className = 'quick-replies';
  wrap.id = 'quick-replies';

  options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = `${idx + 1}. ${opt}`;
    btn.onclick = () => {
      removeQuickReplies();
      sendRaw(String(idx + 1));
    };
    wrap.appendChild(btn);
  });

  chatWindow.appendChild(wrap);
  scrollBottom();
}

function removeQuickReplies() {
  const el = document.getElementById('quick-replies');
  if (el) el.remove();
  state.currentOptions = null;
}

// ── Typing indicator ──
function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-wrap';
  wrap.id = 'typing-indicator';

  const avatar = makeAvatar('bot');

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'typing-dot';
    bubble.appendChild(dot);
  }

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  chatWindow.appendChild(wrap);
  scrollBottom();
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Progress bar ──
function updateProgress(current, total) {
  const wrap  = document.getElementById('progress-wrap');
  const fill  = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');
  const step  = document.getElementById('progress-step');
  const pct   = document.getElementById('progress-pct');

  if (total > 0 && current <= total) {
    wrap.style.display = 'flex';
    const p = Math.round(((current - 1) / total) * 100);
    fill.style.width = p + '%';
    pct.textContent  = p + '%';
    step.textContent = state.lang === 'pt' ? `Passo ${current}` : `Step ${current}`;
    label.textContent = state.lang === 'pt'
      ? `Pergunta ${current} de ${total}`
      : `Question ${current} of ${total}`;
  } else {
    fill.style.width = '100%';
    pct.textContent  = '100%';
    step.textContent = state.lang === 'pt' ? 'Completo!' : 'Complete!';
    label.textContent = state.lang === 'pt' ? 'Recomendações prontas' : 'Recommendations ready';
  }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────
//  Auth Modal
// ─────────────────────────────────────────────
function showModal() {
  document.getElementById('auth-modal').style.display = 'flex';
}

function hideModal() {
  document.getElementById('auth-modal').style.display = 'none';
}

function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('login-form').style.display  = isLogin ? 'flex' : 'none';
  document.getElementById('signup-form').style.display = isLogin ? 'none' : 'flex';
  document.getElementById('auth-error').style.display  = 'none';
  document.querySelectorAll('.auth-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === isLogin);
  });
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn   = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value;
  const pass  = document.getElementById('login-password').value;
  btn.disabled = true;
  btn.textContent = 'Signing in…';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.error || 'Login failed'); return; }
    onAuthSuccess(data.token, data.user);
  } catch { showAuthError('Connection error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Sign In'; }
}

async function handleSignup(e) {
  e.preventDefault();
  const btn      = document.getElementById('signup-btn');
  const name     = document.getElementById('signup-name').value;
  const email    = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  try {
    const res = await fetch('/api/auth/signup', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password }),
    });
    const data = await res.json();
    if (!res.ok) { showAuthError(data.error || 'Signup failed'); return; }
    onAuthSuccess(data.token, data.user);
  } catch { showAuthError('Connection error. Please try again.'); }
  finally { btn.disabled = false; btn.textContent = 'Create Account'; }
}

function onAuthSuccess(token, user) {
  saveAuth(token, user);
  state.userId = 'user_' + user.id;
  state.sessionId = null; // start fresh session for authenticated user
  hideModal();
  updateHeaderAuth();
  showToast(`Welcome, ${user.name}! 👋`);
  init();
}

function skipAuth() {
  hideModal();
  init();
}

async function handleLogout() {
  try {
    await fetch('/api/auth/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
    });
  } catch {}
  clearAuth();
  state.userId  = 'web_' + Math.random().toString(36).slice(2, 10);
  state.sessionId = null;
  updateHeaderAuth();
  chatWindow.innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'none';
  showToast('Signed out');
  showModal();
}

function updateHeaderAuth() {
  if (isLoggedIn()) {
    document.getElementById('status-live').style.display  = 'none';
    document.getElementById('user-badge').style.display   = 'flex';
    document.getElementById('user-name-display').textContent = auth.user.name;
    document.getElementById('user-initials').textContent  = auth.user.name.charAt(0).toUpperCase();
  } else {
    document.getElementById('status-live').style.display  = 'flex';
    document.getElementById('user-badge').style.display   = 'none';
  }
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
async function sendToApi(message) {
  const res = await fetch('/api/webhook/web', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...getAuthHeaders() },
    body: JSON.stringify({
      userId:   state.userId,
      message,
      language: state.lang,
      ...(state.sessionId ? { sessionId: state.sessionId } : {}),
    }),
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  return res.json();
}

// ─────────────────────────────────────────────
//  Core flow
// ─────────────────────────────────────────────
async function sendRaw(text) {
  if (!text.trim()) return;

  sendBtn.disabled = true;
  addMessage(text, 'user');
  showTyping();

  try {
    const data = await sendToApi(text);
    hideTyping();

    state.sessionId      = data.sessionId;
    state.isComplete     = data.isComplete;
    state.questionNumber = data.questionNumber;
    state.totalQuestions = data.totalQuestions;
    localStorage.setItem('smart_session_id', state.sessionId);

    if (data.isComplete && data.offers) {
      updateProgress(data.totalQuestions + 1, data.totalQuestions);
      addOffers(data.offers);
      addMessage(
        state.lang === 'pt'
          ? 'Gostou das recomendações? Clique em ↺ Reset para recomeçar.'
          : 'Like your recommendations? Click ↺ Reset to start over.',
        'bot'
      );
    } else {
      updateProgress(data.questionNumber, data.totalQuestions);
      handleBotResponse(data);
    }
  } catch (err) {
    hideTyping();
    addMessage('Connection error. Please try again.', 'bot');
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

function handleBotResponse(data) {
  const text = (data.response || '').trim();

  // Split welcome + question block
  const parts = text.split('\n\n').filter(s => s.trim());
  parts.forEach(part => addMessage(part.trim(), 'bot'));

  // Quick replies
  if (data.question && data.question.options) {
    const opts = data.question.options[state.lang] || data.question.options.en;
    if (opts) setTimeout(() => addQuickReplies(opts), 120);
  }
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text) return;
  userInput.value = '';
  autoResize(userInput);
  removeQuickReplies();
  await sendRaw(text);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ─────────────────────────────────────────────
//  Language
// ─────────────────────────────────────────────
function setLang(lang) {
  state.lang = lang;
  localStorage.setItem('smart_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === lang.toUpperCase());
  });
}

// ─────────────────────────────────────────────
//  Reset
// ─────────────────────────────────────────────
async function resetSession() {
  localStorage.removeItem('smart_session_id');
  state.sessionId  = null;
  state.isComplete = false;

  chatWindow.innerHTML = '';
  document.getElementById('progress-wrap').style.display = 'none';

  showToast(state.lang === 'pt' ? '↺ Sessão reiniciada' : '↺ Session reset');

  await sendRaw('reset');
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
async function init() {
  sendBtn.disabled = true;
  showTyping();

  try {
    const data = await sendToApi('start');
    hideTyping();

    state.sessionId      = data.sessionId;
    state.isComplete     = data.isComplete;
    state.questionNumber = data.questionNumber;
    state.totalQuestions = data.totalQuestions;
    localStorage.setItem('smart_session_id', state.sessionId);

    if (data.isComplete && data.offers) {
      updateProgress(data.totalQuestions + 1, data.totalQuestions);
      addOffers(data.offers);
    } else {
      updateProgress(data.questionNumber, data.totalQuestions);
      handleBotResponse(data);
    }
  } catch (err) {
    hideTyping();
    addMessage('Unable to connect. Please refresh the page.', 'bot');
    console.error(err);
  } finally {
    sendBtn.disabled = false;
    userInput.focus();
  }
}

// ─────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────
updateHeaderAuth();
if (isLoggedIn()) {
  hideModal();
  init();
} else {
  // Show modal; init() called from onAuthSuccess or skipAuth
  showModal();
}
</script>
