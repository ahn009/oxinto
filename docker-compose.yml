version: '3.9'

services:
  app:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_TYPE: ${DB_TYPE:-postgres}
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-smart_recommendation}
      API_KEY: ${API_KEY:-change-me-in-production}
      SESSION_TIMEOUT_MINUTES: ${SESSION_TIMEOUT_MINUTES:-30}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_PAGE_ACCESS_TOKEN: ${META_PAGE_ACCESS_TOKEN:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      APP_URL: ${APP_URL:-http://localhost:3000}
    volumes:
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-smart_recommendation}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Local development only: SQLite mode (no postgres needed)
  app-dev:
    profiles: ['dev-sqlite']
    build: .
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      DB_TYPE: sqlite
      DB_PATH: /app/data/database.db
      API_KEY: dev-api-key
      SESSION_TIMEOUT_MINUTES: 30
      ALLOWED_ORIGINS: http://localhost:3000
    volumes:
      - ./src:/app/src
      - ./web:/app/web
      - app_data:/app/data
      - app_logs:/app/logs
    restart: unless-stopped

volumes:
  postgres_data:
  app_data:
  app_logs:
